    {
      type:"exercise",
      question:'"Can you figure out what\'s wrong with this code?" O que isso significa?',
      options:["Você pode consertar o código?","Você pode descobrir o que está errado no código?","Você pode escrever esse código?","Você pode deletar esse código?"],
      correct:1,
      explanation:'"Figure out" = descobrir, entender, resolver. A pergunta é se a pessoa consegue entender/descobrir qual é o problema — não necessariamente consertá-lo.'
    }
  ]
};

/* ── State ── */
var points = 0;
var completedEx = new Set();
var isDone = false;

/* ── Helpers ── */
function speak(text, accent){
  var u = new SpeechSynthesisUtterance(text);
  u.lang = accent === 'uk' ? 'en-GB' : 'en-US';
  u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

function notify(msg, type){
  var d = document.createElement('div');
  d.className = 're-notif ' + (type||'success');
  d.textContent = msg;
  document.getElementById('re-wrap').appendChild(d);
  setTimeout(function(){ d.remove(); }, 2500);
}

/* ── Render ── */
function render(){
  completedEx.clear();
  var root = document.getElementById('re-lesson-root');
  root.innerHTML = '';

  /* Progress bar */
  var exercises = lesson.content.filter(function(c){ return c.type === 'exercise'; });
  var total = exercises.length;
  var done = isDone ? total : 0;
  var pct = total ? Math.round((done/total)*100) : 0;
  var prog = document.createElement('div');
  prog.className = 're-module-progress';
  prog.innerHTML = '<div class="re-progress-label"><strong>Intermediário — Lição 1</strong><span>' + done + ' de ' + total + ' exercícios</span></div>'
    + '<div class="re-progress-bar"><div class="re-progress-fill" id="re-prog-fill" style="width:' + pct + '%"></div></div>';
  root.appendChild(prog);

  /* Lesson header */
  var hdr = document.createElement('div');
  hdr.className = 're-lesson-header';
  var safeTitle = lesson.title.replace(lesson.highlight, '<span class="hl">' + lesson.highlight + '</span>');
  hdr.innerHTML = '<div class="re-lesson-meta">' + lesson.icon + ' Lição 1 — Intermediário</div>'
    + '<h2 class="re-lesson-title">' + safeTitle + '</h2>'
    + '<p class="re-lesson-desc">' + lesson.description + '</p>';
  root.appendChild(hdr);

  if(isDone){
    var done_div = document.createElement('div');
    done_div.className = 're-completed';
    done_div.innerHTML = '<div style="font-size:2.5rem">🏆</div><h3>Lição Concluída!</h3><p>Revise o conteúdo abaixo a qualquer momento.</p>';
    root.appendChild(done_div);
  }

  lesson.content.forEach(function(item){
    if(isDone && item.type === 'exercise') return;
    var block = renderBlock(item);
    if(block) root.appendChild(block);
  });
}

function renderBlock(item){
  var block = document.createElement('div');
  block.className = 're-block';

  /* HOOK */
  if(item.type === 'hook'){
    block.classList.add('re-hook');
    block.innerHTML = '<div class="re-block-title">⚡ Você sabia?</div>'
      + '<div class="re-hook-grid">'
      + '<div class="re-hook-wrong"><div class="re-hook-label">❌ Do jeito do livro</div>'
      + '<div class="re-hook-phrase">' + item.wrong.phrase + '</div>'
      + '<div class="re-hook-note">' + item.wrong.note + '</div></div>'
      + '<div class="re-hook-right"><div class="re-hook-label">✅ Do jeito real</div>'
      + '<div class="re-hook-phrase">' + item.right.phrase + '</div>'
      + '<div class="re-hook-note">' + item.right.note + '</div></div>'
      + '</div>';
  }

  /* EXPLANATION */
  else if(item.type === 'explanation'){
    block.innerHTML = '<div class="re-block-title">' + item.title + '</div>'
      + '<div class="re-explanation">' + item.text + '</div>';
  }

  /* READING */
  else if(item.type === 'reading'){
    var audioBtn = item.audioText
      ? '<button class="re-reading-audio-btn" onclick="reSpeak(\'' + item.audioText.replace(/'/g,"\\'") + '\',\'us\')">🔊 Ouvir o texto completo</button>'
      : '';
    block.innerHTML = '<div class="re-block-title">' + item.title + '</div>'
      + '<p style="font-size:0.85rem;color:#64748b;margin-bottom:8px;">' + (item.intro||'') + '</p>'
      + audioBtn
      + '<div class="re-reading-text">' + item.text + '</div>'
      + '<div class="re-grammar-legend">'
      + '<div class="re-legend-item"><div class="re-legend-dot" style="background:#7c3aed"></div><span style="color:#7c3aed;font-weight:600">Verbos</span></div>'
      + '<div class="re-legend-item"><div class="re-legend-dot" style="background:#0369a1"></div><span style="color:#0369a1;font-weight:600">Substantivos</span></div>'
      + '<div class="re-legend-item"><div class="re-legend-dot" style="background:#b45309"></div><span style="color:#b45309;font-weight:600">Adjetivos</span></div>'
      + '<div class="re-legend-item"><div class="re-legend-dot" style="background:#059669"></div><span style="color:#059669;font-weight:600">Preposições</span></div>'
      + '<div class="re-legend-item"><div class="re-legend-dot" style="background:#be185d"></div><span style="color:#be185d;font-weight:600">Conectores</span></div>'
      + '</div>';
  }

  /* DIALOGUE */
  else if(item.type === 'dialogue'){
    block.innerHTML = '<div class="re-block-title">' + item.title + '</div><div class="re-dialogue"></div>';
    var dl = block.querySelector('.re-dialogue');
    item.lines.forEach(function(line){
      var el = document.createElement('div');
      el.className = 're-line ' + line.side;
      var cleanEn = line.en.replace(/'/g,"\\'");
      el.innerHTML = '<div class="re-avatar">' + (line.side==='left'?'👤':'🙋') + '</div>'
        + '<div class="re-bubble-wrap">'
        + '<div class="re-speaker">' + line.speaker + '</div>'
        + '<div class="re-bubble">'
        + '<div class="re-bubble-en">' + line.en + '</div>'
        + '<div class="re-bubble-pt">' + line.pt + '</div>'
        + '<button class="re-bubble-play" onclick="reSpeak(\'' + cleanEn + '\',\'us\')">🔊 ouvir</button>'
        + '</div></div>';
      dl.appendChild(el);
    });
  }

  /* VOCABULARY */
  else if(item.type === 'vocabulary'){
    block.innerHTML = '<div class="re-block-title">' + item.title + '</div><div class="re-vocab-grid"></div>';
    var grid = block.querySelector('.re-vocab-grid');
    var flagLabel = {us:'🇺🇸 AmE', uk:'🇬🇧 BrE', both:'🌍 Ambos'};
    item.words.forEach(function(w){
      var cleanWord = w.word.replace(/'/g,"\\'");
      var acc = w.flag==='uk'?'uk':'us';
      var card = document.createElement('div');
      card.className = 're-vocab-card';
      card.innerHTML = '<div class="re-vocab-word">' + w.word
        + '<span class="re-flag ' + w.flag + '">' + (flagLabel[w.flag]||w.flag) + '</span></div>'
        + '<div class="re-vocab-meaning">📖 ' + w.meaning + '</div>'
        + '<div class="re-vocab-example">💬 ' + w.example + '</div>'
        + '<button class="re-vocab-play" onclick="reSpeak(\'' + cleanWord + '\',\'' + acc + '\')">🔊 ouvir</button>';
      grid.appendChild(card);
    });
  }

  /* AUDIO */
  else if(item.type === 'audio'){
    block.innerHTML = '<div class="re-block-title">' + item.title + '</div><div class="re-audio-list"></div>';
    var list = block.querySelector('.re-audio-list');
    item.items.forEach(function(a, ai){
      var fname = 'i01-' + (ai<9?'0':'') + (ai+1) + '.mp3';
      var el = document.createElement('div');
      el.className = 're-audio-item';
      el.setAttribute('data-audio-file', fname);
      el.innerHTML = '<button class="re-audio-btn">▶</button>'
        + '<div><div class="re-audio-en">' + a.en + '</div>'
        + '<div class="re-audio-pt">' + a.pt + '</div>'
        + '<div class="re-audio-file">📁 ' + fname + '</div></div>';
      el.onclick = function(){ reSpeak(a.en, a.accent); };
      list.appendChild(el);
    });
  }

  /* GAP */
  else if(item.type === 'gap'){
    block.innerHTML = '<div class="re-block-title">' + item.title + '</div><div class="re-gap-list"></div>';
    var glist = block.querySelector('.re-gap-list');
    item.sentences.forEach(function(s, si){
      var wrap = document.createElement('div');
      wrap.className = 're-gap-item';
      var optsHtml = '<option value="" disabled selected>▼ escolha</option>';
      s.options.forEach(function(o, oi){ optsHtml += '<option value="' + oi + '">' + o + '</option>'; });
      wrap.innerHTML = '<div class="re-gap-sentence">'
        + '<span>' + s.before + '</span>'
        + '<select class="re-gap-select" data-correct="' + s.correct + '">' + optsHtml + '</select>'
        + '<span>' + s.after + '</span>'
        + '</div>'
        + '<div class="re-gap-feedback" style="display:none"></div>';
      var sel = wrap.querySelector('.re-gap-select');
      sel.addEventListener('change', function(){
        var fb = wrap.querySelector('.re-gap-feedback');
        var correct = parseInt(this.getAttribute('data-correct'));
        var chosen = parseInt(this.value);
        fb.style.display = 'block';
        if(chosen === correct){
          this.style.borderColor='#16a34a'; this.style.background='#dcfce7';
          fb.className='re-gap-feedback re-gap-ok'; fb.textContent='✅ Correto!';
          points += 5; notify('+5 pontos! ⭐','success');
        } else {
          this.style.borderColor='#dc2626'; this.style.background='#fee2e2';
          fb.className='re-gap-feedback re-gap-fail'; fb.textContent='❌ Tente: ' + s.options[correct];
          var self = this;
          setTimeout(function(){
            self.value=''; self.style.borderColor=''; self.style.background='';
            fb.style.display='none';
          }, 2000);
        }
      });
      glist.appendChild(wrap);
    });
  }

  /* ORAL DRILL */
  else if(item.type === 'oral_drill'){
    var modelEnClean = item.model.en.replace(/'/g,"\\'");
    block.innerHTML = '<div class="re-block-title">' + item.title + '</div>'
      + '<p class="re-drill-instruction">' + item.instruction + '</p>'
      + '<div class="re-drill-model">'
      + '<div class="re-drill-model-label">🎯 Frase modelo</div>'
      + '<div class="re-drill-en">' + item.model.en + '</div>'
      + '<div class="re-drill-pt">' + item.model.pt + '</div>'
      + '<button class="re-drill-play" onclick="reSpeak(\'' + modelEnClean + '\',\'us\')">🔊 Ouvir modelo</button>'
      + '</div><div class="re-drill-prompts"></div>';
    var plist = block.querySelector('.re-drill-prompts');
    item.prompts.forEach(function(p){
      var ansClean = p.answer.replace(/'/g,"\\'").replace(/\[.*?\]/g,'');
      var pdiv = document.createElement('div');
      pdiv.className = 're-drill-prompt';
      pdiv.innerHTML = '<div class="re-drill-cue">💬 ' + p.cue + '</div>'
        + '<div class="re-drill-steps">'
        + '<button class="re-drill-try" onclick="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'">🎤 Tentei — mostrar resposta</button>'
        + '<div class="re-drill-answer" style="display:none">'
        + '<div class="re-drill-answer-label">✅ Resposta esperada:</div>'
        + '<div class="re-drill-answer-text">' + p.answer + '</div>'
        + '<button class="re-drill-play-ans" onclick="reSpeak(\'' + ansClean + '\',\'us\')">🔊 Ouvir</button>'
        + '</div></div>';
      plist.appendChild(pdiv);
    });
  }

  /* EXERCISE */
  else if(item.type === 'exercise'){
    block.innerHTML = '<div class="re-block-title">📝 Exercício</div>'
      + '<div class="re-exercise-q">' + item.question + '</div>'
      + '<div class="re-options"></div>';
    var opts = block.querySelector('.re-options');
    item.options.forEach(function(opt, idx){
      var btn = document.createElement('button');
      btn.className = 're-option';
      btn.textContent = opt;
      btn.onclick = function(){ checkAnswer(idx, item, btn, opts, block); };
      opts.appendChild(btn);
    });
  }

  else { return null; }
  return block;
}

function checkAnswer(idx, item, btn, opts, block){
  var key = item.question;
  if(completedEx.has(key)){ notify('Já respondido!','warning'); return; }
  var allBtns = opts.querySelectorAll('.re-option');
  allBtns.forEach(function(b){ b.disabled = true; });
  var isCorrect = idx === item.correct;
  if(isCorrect){
    btn.classList.add('correct');
    points += 10; notify('+10 pontos! ⭐','success');
    completedEx.add(key);
    var fb = document.createElement('div');
    fb.className = 're-feedback ok';
    fb.innerHTML = '✅ Correto! ' + item.explanation;
    block.appendChild(fb);
    setTimeout(function(){ block.remove(); checkAllDone(); }, 1500);
  } else {
    btn.classList.add('wrong');
    allBtns[item.correct].classList.add('correct');
    var fb2 = document.createElement('div');
    fb2.className = 're-feedback fail';
    fb2.innerHTML = '📖 ' + item.explanation;
    block.querySelector('.re-options').after(fb2);
    setTimeout(function(){
      fb2.remove();
      allBtns.forEach(function(b){ b.disabled=false; b.classList.remove('wrong','correct'); });
    }, 2200);
  }
}
<!-- teste -->
function checkAllDone(){
  var remaining = document.querySelectorAll('#re-lesson-root .re-exercise-q');
  if(remaining.length === 0){
    isDone = true;
    notify('🎉 Lição concluída! Parabéns!','success');
    setTimeout(function(){ render(); }, 900);
  }
}

/* ── Expose speak globally with re- prefix to avoid conflicts ── */
window.reSpeak = speak;

render();

})();
</script>
